name: Build & Package Voquill (PROD) for Arch

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # =================================================================
  # 1. ETAPP: Ehitus Ubuntul (ubuntu-22.04 - sama mis upstream CI).
  #    PRODUCTION flavor: ühendub päris Voquill pilve backendiga.
  # =================================================================
  build-ubuntu:
    name: Build on Ubuntu (prod)
    runs-on: ubuntu-22.04
    env:
      TAURI_PLATFORM: linux
      VOQUILL_DESKTOP_PLATFORM: linux
      VOQUILL_REQUIRE_GPU_SIDECAR: "false"
      APPIMAGE_EXTRACT_AND_RUN: "1"
      # Tühjad allkirjavõtmed - updater ei proovi allkirjastada (meil pole privaatvõtit)
      TAURI_SIGNING_PRIVATE_KEY: ""
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
      # Google OAuth credentials (PROD) - need on upstream koodis avalikud
      VOQUILL_GOOGLE_CLIENT_ID: "777461284594-dhgao2eek53ppl4o188ik2i9cigdcmnp.apps.googleusercontent.com"
      VOQUILL_GOOGLE_CLIENT_SECRET: "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"
    steps:
      - name: Repo kloonimine
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (.nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Süsteemi sõltuvused (upstream Ubuntu skript)
        run: |
          chmod +x ./.github/scripts/install-desktop-linux-deps.sh
          ./.github/scripts/install-desktop-linux-deps.sh

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Sea productName/mainBinaryName = voquill-desktop (nagu CI prod teeb)
      - name: Sea prod paketinimi konfis
        run: |
          cfg="apps/desktop/src-tauri/tauri.prod.conf.json"
          tmp=$(mktemp)
          jq --arg name "voquill-desktop" '.productName = $name | .mainBinaryName = $name' "$cfg" > "$tmp"
          mv "$tmp" "$cfg"
          echo "--- uuendatud konf ---"
          jq '.productName, .mainBinaryName' "$cfg"

      - name: Turbo build desktop
        run: pnpm exec turbo run build --filter=desktop...

      - name: Tauri build (PROD konf)
        continue-on-error: true
        run: |
          cd apps/desktop
          pnpm tauri build --config src-tauri/tauri.prod.conf.json

      - name: Leia ja kogu paketid
        run: |
          mkdir -p build-output
          echo "--- bundle väljundid ---"
          find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) 2>/dev/null
          find . -type f -name "*.deb" -exec cp {} build-output/ \; 2>/dev/null || true
          find . -type f -name "*.AppImage" -exec cp {} build-output/ \; 2>/dev/null || true
          echo "--- kogutud ---"
          ls -la build-output/
          if ! ls build-output/*.deb >/dev/null 2>&1; then
            echo "VIGA: .deb faili ei toodetud."
            exit 1
          fi
          echo "OK: .deb olemas."

      - name: Laadi build artefaktiks
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build-output
          path: build-output/
          retention-days: 1
          if-no-files-found: error

  # =================================================================
  # 2. ETAPP: Pakendamine Arch'i paketiks (.pkg.tar.zst)
  # =================================================================
  package-arch:
    name: Package for Arch (prod)
    needs: build-ubuntu
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Arch tööriistad
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel sudo libarchive binutils jq

      - name: Lae alla Ubuntu build
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-build-output
          path: build-output

      - name: Loo makepkg kasutaja
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Valmista PKGBUILD ette
        run: |
          set -euo pipefail
          mkdir -p /home/builder/pkg
          DEB=$(find build-output -name "*.deb" | head -n1)
          if [ -z "$DEB" ]; then
            echo "VIGA: .deb faili ei leitud!"; ls -la build-output/; exit 1
          fi
          echo "Kasutan deb-i: $DEB"
          cp "$DEB" /home/builder/pkg/voquill.deb

          PKGVER="0.1.0"

          sed 's/^|//' > /home/builder/pkg/PKGBUILD << PKGEOF
          |# Maintainer: kirlis950
          |pkgname=voquill-desktop
          |pkgver=${PKGVER}
          |pkgrel=${GITHUB_RUN_NUMBER}
          |pkgdesc="Voquill - AI voice dictation (production)"
          |arch=('x86_64')
          |url="https://github.com/voquill/voquill"
          |license=('AGPL3')
          |depends=(
          |  'webkit2gtk-4.1'
          |  'gtk3'
          |  'gtk-layer-shell'
          |  'libappindicator-gtk3'
          |  'librsvg'
          |  'alsa-lib'
          |  'gstreamer'
          |  'gst-plugins-base'
          |  'gst-plugins-good'
          |  'openssl'
          |  'xdotool'
          |  'vulkan-icd-loader'
          |)
          |optdepends=(
          |  'wtype: Wayland teksti sisestus'
          |)
          |provides=('voquill')
          |conflicts=('voquill-desktop-dev')
          |options=('!strip' '!debug')
          |source=('voquill.deb')
          |sha256sums=('SKIP')
          |
          |package() {
          |  cd "\$srcdir"
          |  ar x voquill.deb
          |  bsdtar -xf data.tar.* -C "\$pkgdir/"
          |}
          PKGEOF

          chown -R builder:builder /home/builder/pkg
          echo "--- PKGBUILD ---"
          cat /home/builder/pkg/PKGBUILD

      - name: makepkg
        run: |
          sudo -u builder bash -c "cd /home/builder/pkg && makepkg -f --nodeps --noconfirm"
          echo "--- valmis paketid ---"
          ls -la /home/builder/pkg/*.pkg.tar.zst

      - name: Kogu release jaoks
        run: |
          mkdir -p release-assets
          cp /home/builder/pkg/*.pkg.tar.zst release-assets/
          find build-output -name "*.AppImage" -exec cp {} release-assets/ \; 2>/dev/null || true
          ls -la release-assets/

      - name: Release tag
        id: vars
        run: echo "tag=arch-prod-v0.1.0-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Voquill Arch pakett (PROD) ${{ steps.vars.outputs.tag }}"
          body: |
            Arch Linuxi pakett (.pkg.tar.zst) - PRODUCTION flavor.
            Ühendub päris Voquill pilve backendiga.
            Ehitatud ubuntu-22.04, pakendatud archlinux konteineris.

            Paigaldus:
            sudo pacman -U voquill-desktop-*.pkg.tar.zst

            Kui eelnevalt paigaldatud dev-versioon:
            sudo pacman -R voquill-desktop-dev
            sudo pacman -U voquill-desktop-*.pkg.tar.zst

            Commit: ${{ github.sha }}
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
