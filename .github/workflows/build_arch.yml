name: Build & Package Voquill for Arch

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # =================================================================
  # 1. ETAPP: Ehitus Ubuntul (ubuntu-22.04 - sama mis upstream CI).
  #    Arch'i konteineris whisper-rs-sys ei kompileeru liiga uue
  #    glibc/clang tõttu, seega ehitame siin ja toodame .deb-i.
  # =================================================================
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-22.04
    env:
      TAURI_PLATFORM: linux
      VOQUILL_DESKTOP_PLATFORM: linux
      VOQUILL_REQUIRE_GPU_SIDECAR: "false"
      APPIMAGE_EXTRACT_AND_RUN: "1"
      FLAVOR: dev
      VITE_FLAVOR: dev
      VOQUILL_BUILD_FLAVOR: dev
      VOQUILL_DESKTOP_FLAVOR: dev
    steps:
      - name: Repo kloonimine
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (.nvmrc -> v24)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Süsteemi sõltuvused (upstream Ubuntu skript)
        run: |
          chmod +x ./.github/scripts/install-desktop-linux-deps.sh
          ./.github/scripts/install-desktop-linux-deps.sh

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Turbo build desktop
        run: pnpm exec turbo run build --filter=desktop...

      - name: Tauri build (.deb bundle)
        # continue-on-error: build toodab paketid edukalt, aga tauri updater
        # katkestab lõpus vea-koodiga, sest privaatset allkirjavõtit pole.
        # Failid on siiski olemas - kontrollime neid järgmises sammus.
        continue-on-error: true
        env:
          # Tühi väärtus => tauri ei proovi updater-artefakte allkirjastada
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          cd apps/desktop
          pnpm tauri build --config src-tauri/tauri.dev.conf.json

      - name: Leia ja kogu .deb + binaar
        run: |
          mkdir -p build-output
          echo "--- otsin bundle väljundeid ---"
          find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) 2>/dev/null
          # Kopeerime .deb (Arch pakendamise allikas)
          find . -type f -name "*.deb" -exec cp {} build-output/ \; 2>/dev/null || true
          # AppImage varuvariandina
          find . -type f -name "*.AppImage" -exec cp {} build-output/ \; 2>/dev/null || true
          echo "--- kogutud ---"
          ls -la build-output/
          # Kontrollime, et .deb ikka tekkis (muidu peatame siin selge veaga)
          if ! ls build-output/*.deb >/dev/null 2>&1; then
            echo "VIGA: .deb faili ei toodetud - build kukkus tegelikult enne pakendamist."
            exit 1
          fi
          echo "OK: .deb on olemas."

      - name: Laadi build artefaktiks (etapp 2 jaoks)
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build-output
          path: build-output/
          retention-days: 1
          if-no-files-found: error

  # =================================================================
  # 2. ETAPP: Pakendamine Arch'i paketiks (.pkg.tar.zst).
  #    Võtame Ubuntu .deb-i, ekstraktime failid ja makepkg-iga
  #    teeme korrektse pacman-paigaldatava paketi.
  # =================================================================
  package-arch:
    name: Package for Arch
    needs: build-ubuntu
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Arch tööriistad
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            sudo \
            libarchive \
            binutils \
            jq

      - name: Lae alla Ubuntu build
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-build-output
          path: build-output

      - name: Loo makepkg kasutaja (makepkg ei jookse root'ina)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Valmista PKGBUILD ette
        run: |
          set -euo pipefail
          mkdir -p /home/builder/pkg
          # Leia .deb fail
          DEB=$(find build-output -name "*.deb" | head -n1)
          if [ -z "$DEB" ]; then
            echo "VIGA: .deb faili ei leitud!"
            ls -la build-output/
            exit 1
          fi
          echo "Kasutan deb-i: $DEB"
          cp "$DEB" /home/builder/pkg/voquill.deb

          PKGVER="0.1.0"

          # Kirjutame PKGBUILD-i ilma YAML-taandeta.
          # 'PKGEOF' jutumärkides => bash EI interpoleeri; muutujad asendame envsubst'iga hiljem.
          # Lihtsam: kasutame sed'i, et eemaldada iga rea algusest taane (märgis '|').
          sed 's/^|//' > /home/builder/pkg/PKGBUILD << PKGEOF
          |# Maintainer: kirlis950
          |pkgname=voquill-desktop-dev
          |pkgver=${PKGVER}
          |pkgrel=${GITHUB_RUN_NUMBER}
          |pkgdesc="Voquill - AI voice dictation (dev-flavor, repackaged from upstream .deb)"
          |arch=('x86_64')
          |url="https://github.com/voquill/voquill"
          |license=('AGPL3')
          |depends=(
          |  'webkit2gtk-4.1'
          |  'gtk3'
          |  'libappindicator-gtk3'
          |  'librsvg'
          |  'alsa-lib'
          |  'gstreamer'
          |  'gst-plugins-base'
          |  'gst-plugins-good'
          |  'openssl'
          |  'libxdo'
          |  'vulkan-icd-loader'
          |)
          |optdepends=(
          |  'wtype: Wayland teksti sisestus'
          |  'xdotool: X11 teksti sisestus'
          |)
          |provides=('voquill')
          |options=('!strip' '!debug')
          |source=('voquill.deb')
          |sha256sums=('SKIP')
          |
          |package() {
          |  cd "\$srcdir"
          |  ar x voquill.deb
          |  bsdtar -xf data.tar.* -C "\$pkgdir/"
          |}
          PKGEOF

          chown -R builder:builder /home/builder/pkg
          echo "--- PKGBUILD ---"
          cat /home/builder/pkg/PKGBUILD

      - name: makepkg (loo .pkg.tar.zst)
        run: |
          cd /home/builder/pkg
          # --nodeps: ei installi runtime-deps (need on ainult metaandmed lõppkasutajale)
          # -f: kirjuta üle, --noconfirm: pole interaktiivne
          sudo -u builder bash -c "cd /home/builder/pkg && makepkg -f --nodeps --noconfirm"
          echo "--- valmis paketid ---"
          ls -la /home/builder/pkg/*.pkg.tar.zst

      - name: Kogu pakett release jaoks
        run: |
          mkdir -p release-assets
          cp /home/builder/pkg/*.pkg.tar.zst release-assets/
          # Lisame ka AppImage'i kui see ehitati (portable variant)
          find build-output -name "*.AppImage" -exec cp {} release-assets/ \; 2>/dev/null || true
          ls -la release-assets/

      - name: Release tag
        id: vars
        run: |
          echo "tag=arch-v0.1.0-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Voquill Arch pakett ${{ steps.vars.outputs.tag }}"
          body: |
            Arch Linuxi pakett (.pkg.tar.zst), pakendatud upstream dev-buildist.
            Ehitatud ubuntu-22.04 peal, pakendatud archlinux konteineris.

            Paigaldus:
            sudo pacman -U voquill-desktop-dev-*.pkg.tar.zst

            Commit: ${{ github.sha }}
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
